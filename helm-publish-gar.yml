---
helm:publish:gar:
  image: europe-west1-docker.pkg.dev/jobtome-platform/public/gitlab-ci-tools:v1.0.0

  stage: push

  variables:
    HELM_EXPERIMENTAL_OCI: "1"

  script:
    - |
      set -e

      # VALIDATING VARIABLES

      for var in "GOOGLE_PROJECT" "GOOGLE_ARTIFACT_REGISTRY_REPOSITORY" "GOOGLE_KEY"; do
        if [ -z "${!var}" ]; then
          echo
          echo "[ERROR] Required Variable Not Set: \"${var}\"!"
          echo

          exit 1
        fi
      done

      echo
      echo "[INFO] All Required Variables Set."
      echo

      # GOOGLE AUTHENTICATION

      echo "${GOOGLE_KEY}" > /tmp/key.json
      gcloud auth activate-service-account --key-file /tmp/key.json
      gcloud config set project "${GOOGLE_PROJECT}"

      ACCESS_TOKEN="$(gcloud auth print-access-token)"
      helm registry login -u oauth2accesstoken -p "${ACCESS_TOKEN}" https://"${GOOGLE_ARTIFACT_REGISTRY_REPOSITORY}"

      VERSION="${CI_COMMIT_TAG}"

      if [ -n "${HELM_CHART_VERSION}" ]; then
        VERSION="${HELM_CHART_VERSION}"
      fi

      helm package . --version "${VERSION}"

      HELM_CHART_PACKAGE="generic-chart-${VERSION}.tgz"

      echo
      echo "[INFO] Helm Chart Package Name: \"${HELM_CHART_PACKAGE}\"."
      echo

      helm push "${HELM_CHART_PACKAGE}" oci://"${GOOGLE_ARTIFACT_REGISTRY_REPOSITORY}"

      echo
      echo "[INFO] Helm Chart Successfully Pushed to Google Artifact Registry."
      echo

  only:
    - /^v.+$/i
  except:
    - branches
